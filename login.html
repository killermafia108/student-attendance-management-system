<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body{
            font-family:Arial;
            background:#f4f4f4;
        }

        .login-box{
            width:350px;
            margin:100px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
            text-align:center;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px 20px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Student Attendance Login</h2>

    <input type="text" placeholder="Username">

    <input type="password" placeholder="Password">

    <br>

    <button onclick="window.location.href='index.html'">
        Login
    </button>
</div>

</body>
</html>
